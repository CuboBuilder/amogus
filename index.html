<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amogus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 
                15vw 15vh #fff, 85vw 20vh #fff, 40vw 60vh #fff, 
                10vw 85vh #fff, 95vw 90vh #fff, 30vw 35vh #fff,
                65vw 10vh #aaa, 70vw 75vh #fff, 20vw 45vh #aaa,
                55vw 5vh #fff, 80vw 45vh #fff, 5vw 30vh #aaa;
            animation: twinkle 4s infinite ease-in-out;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 
                25vw 25vh #5df, 75vw 80vh #f5d, 45vw 15vh #5df, 
                60vw 65vh #f5d, 10vw 10vh #fff, 90vw 5vh #5df;
            animation: twinkle 6s infinite reverse;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .sun-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sun {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 165, 0, 0.6);
            border: 4px solid #fff;
            animation: sun-pulse 4s ease-in-out infinite;
        }

        @keyframes sun-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .orbit {
            position: absolute;
            width: 480px;
            height: 480px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: rotate-orbit 20s linear infinite;
        }

        @keyframes rotate-orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .planet {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .planet:hover {
            transform: scale(1.4) !important;
            box-shadow: 0 0 30px #fff;
            z-index: 50;
        }

        .oil { top: -45px; left: 50%; margin-left: -45px; }
        .beef { bottom: -45px; left: 50%; margin-left: -45px; }
        .abigus { top: 50%; left: -45px; margin-top: -45px; }

        .planet img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: counter-rotate 20s linear infinite;
        }

        @keyframes counter-rotate {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="sun-container">
        <img src="misc/mu.jpg" class="sun" alt="MU">

        <div class="orbit">
            
            <a href="oil/index.html" class="planet oil">
                <img src="oil/usa.jpg" alt="OIL">
            </a>

            <a href="beef/index.html" class="planet beef">
                <img src="beef/beef.jpg" alt="BEEF">
            </a>

            <a href="abigus/index.html" class="planet abigus">
                <img src="abigus/abigus.jpg" alt="ABIGUS">
            </a>

        </div>
    </div>
</body>
</html>
