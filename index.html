<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amogus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Stars */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 
                15vw 15vh #fff, 85vw 20vh #fff, 40vw 60vh #fff, 
                10vw 85vh #fff, 95vw 90vh #fff, 30vw 35vh #fff,
                65vw 10vh #fff, 70vw 75vh #fff, 20vw 45vh #fff,
                55vw 5vh #fff, 80vw 45vh #fff, 5vw 30vh #fff;
            z-index: 1;
        }

        .sun-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vmin;
            height: 100vmin;
        }

        .sun {
            width: 15vmin;
            height: 15vmin;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 0, 0.3);
            object-fit: cover;
            z-index: 20;
        }

        .orbit {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none; /* Allows clicking planets "behind" orbits */
            display: flex;
            justify-content: center;
        }

        @keyframes rotate-orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .planet {
            position: absolute;
            border-radius: 50%; 
            border: none; 
            transition: transform 0.3s ease;
            cursor: pointer;
            pointer-events: auto; 
            overflow: hidden;
            top: 0;
            transform: translateY(-50%);
        }

        .planet:hover {
            transform: translateY(-50%) scale(1.2) !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        .planet img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .orbit-beef {
            width: 35vmin; 
            height: 35vmin;
            animation: rotate-orbit 10s linear infinite;
        }
        .beef-planet {
            width: 7vmin; 
            height: 7vmin;
        }

        .orbit-abigus {
            width: 60vmin; 
            height: 60vmin;
            animation: rotate-orbit 18s linear infinite;
        }
        .abigus-planet {
            width: 9vmin; 
            height: 9vmin;
        }

        .orbit-usa {
            width: 85vmin; 
            height: 85vmin;
            animation: rotate-orbit 30s linear infinite;
        }
        .usa-planet {
            width: 12vmin; 
            height: 12vmin;
        }

        .planet img { animation: counter-rotate inherit; }
        .orbit-beef .planet img { animation-duration: 10s; }
        .orbit-abigus .planet img { animation-duration: 18s; }
        .orbit-usa .planet img { animation-duration: 30s; }

        @keyframes counter-rotate {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

    </style>
</head>
<body>

    <div class="sun-container">
        <img src="misc/mu.jpg" class="sun" alt="MU">

        <div class="orbit orbit-beef">
            <a href="beef/index.html" class="planet beef-planet">
                <img src="beef/beef.jpg" alt="BEEF">
            </a>
        </div>

        <div class="orbit orbit-abigus">
            <a href="abigus/index.html" class="planet abigus-planet">
                <img src="abigus/abigus.jpg" alt="ABIGUS">
            </a>
        </div>

        <div class="orbit orbit-usa">
            <a href="oil/index.html" class="planet usa-planet">
                <img src="oil/usa.jpg" alt="OIL">
            </a>
        </div>
    </div>

</body>
</html>
